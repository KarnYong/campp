name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      # Import Code Signing Certificate
      - name: Import Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          # Set keychain settings to prevent UI prompts
          security set-keychain-settings -lut 21600 build.keychain
          # Add codesign to ACL with all necessary flags
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          security list-keychains -s build.keychain
          security find-identity -v build.keychain

      # Get signing identity from certificate
      - name: Get Signing Identity
        id: signing_identity
        run: |
          # List all identities and find Developer ID Application
          security find-identity -v build.keychain
          IDENTITY=$(security find-identity -v build.keychain | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application certificate found!"
            exit 1
          fi
          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "Found identity: $IDENTITY"

      # Update tauri.conf.json with the signing identity
      - name: Update Signing Identity in Config
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          import json, os
          with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          config['bundle']['macOS']['signingIdentity'] = os.environ['IDENTITY']
          with open('src-tauri/tauri.conf.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, indent='  ')
        shell: python3 {0}

      # Build for ARM64
      - name: Build ARM64
        run: npm run tauri build -- --target aarch64-apple-darwin

      # Build for x64
      - name: Build x64
        run: npm run tauri build -- --target x86_64-apple-darwin

      # Verify and re-sign ARM64 app
      - name: Verify and Re-sign ARM64
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/CAMPP.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"
          # Unlock keychain before signing
          security unlock-keychain -p actions build.keychain
          # Verify current signature
          codesign -dv "$APP_PATH" 2>&1 || true
          # Re-sign with hardened runtime (removed deprecated --deep flag)
          codesign --force --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"
          # Verify signature again
          codesign -vvv "$APP_PATH"

      # Notarize and create DMG for ARM64
      - name: Notarize and Create DMG for ARM64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/CAMPP.app"

          # Create ZIP for notarization using ditto (more reliable for macOS bundles)
          ditto -c -k --keepParent "$APP_PATH" CAMPP-arm64.zip

          # Submit for notarization (no wait - returns submission ID)
          SUBMISSION_OUTPUT=$(xcrun notarytool submit CAMPP-arm64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json)

          echo "$SUBMISSION_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | python3 -c 'import sys, json; print(json.load(sys.stdin)["id"])')
          echo "Submission ID: $SUBMISSION_ID"

          # Poll for notarization completion with timeout
          echo "Waiting for notarization to complete..."
          MAX_WAIT=1800  # 30 minutes max wait (notarization can take 15-20 min)
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1)

            STATUS=$(echo "$STATUS_OUTPUT" | python3 -c 'import sys, json; print(json.load(sys.stdin)["status"])')
            echo "Current status: $STATUS (elapsed: ${ELAPSED}s)"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization successful!"
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "Notarization failed!"
              echo "$STATUS_OUTPUT"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Notarization timed out after ${MAX_WAIT}s"
            echo "Check status manually with: xcrun notarytool info $SUBMISSION_ID"
            exit 1
          fi

          # Staple the ticket
          xcrun stapler staple "$APP_PATH"

          # Create DMG
          DMG_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/CAMPP-arm64.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          hdiutil create -volname "CAMPP" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      # Verify and re-sign x64 app
      - name: Verify and Re-sign x64
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/CAMPP.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"
          # Unlock keychain before signing
          security unlock-keychain -p actions build.keychain
          # Verify current signature
          codesign -dv "$APP_PATH" 2>&1 || true
          # Re-sign with hardened runtime (removed deprecated --deep flag)
          codesign --force --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"
          # Verify signature again
          codesign -vvv "$APP_PATH"

      # Notarize and create DMG for x64
      - name: Notarize and Create DMG for x64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/CAMPP.app"

          # Create ZIP for notarization using ditto (more reliable for macOS bundles)
          ditto -c -k --keepParent "$APP_PATH" CAMPP-x64.zip

          # Submit for notarization (no wait - returns submission ID)
          SUBMISSION_OUTPUT=$(xcrun notarytool submit CAMPP-x64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json)

          echo "$SUBMISSION_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | python3 -c 'import sys, json; print(json.load(sys.stdin)["id"])')
          echo "Submission ID: $SUBMISSION_ID"

          # Poll for notarization completion with timeout
          echo "Waiting for notarization to complete..."
          MAX_WAIT=1800  # 30 minutes max wait (notarization can take 15-20 min)
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1)

            STATUS=$(echo "$STATUS_OUTPUT" | python3 -c 'import sys, json; print(json.load(sys.stdin)["status"])')
            echo "Current status: $STATUS (elapsed: ${ELAPSED}s)"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization successful!"
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "Notarization failed!"
              echo "$STATUS_OUTPUT"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Notarization timed out after ${MAX_WAIT}s"
            echo "Check status manually with: xcrun notarytool info $SUBMISSION_ID"
            exit 1
          fi

          # Staple the ticket
          xcrun stapler staple "$APP_PATH"

          # Create DMG
          DMG_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/CAMPP-x64.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          hdiutil create -volname "CAMPP" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      # Create Universal Binary
      - name: Create Universal Binary
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          ARM64_APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/CAMPP.app"
          X64_APP="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/CAMPP.app"
          UNIVERSAL_APP="src-tauri/target/universal-apple-darwin/release/bundle/macos/CAMPP.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"

          mkdir -p "$(dirname "$UNIVERSAL_APP")"

          # Copy ARM64 app as base
          ditto "$ARM64_APP" "$UNIVERSAL_APP"

          # Find and merge all binaries using lipo
          find "$X64_APP/Contents" -type f -exec file {} \; | grep "Mach-O" | while read line; do
            X64_BINARY=$(echo "$line" | cut -d: -f1 | xargs)
            REL_PATH="${X64_BINARY#$X64_APP/}"
            UNIVERSAL_BINARY="$UNIVERSAL_APP/$REL_PATH"
            ARM64_BINARY="$ARM64_APP/$REL_PATH"

            if [ -f "$ARM64_BINARY" ]; then
              echo "Merging: $REL_PATH"
              mkdir -p "$(dirname "$UNIVERSAL_BINARY")"
              lipo -create -output "$UNIVERSAL_BINARY" "$ARM64_BINARY" "$X64_BINARY"
            fi
          done

          # Re-sign the universal app
          security unlock-keychain -p actions build.keychain
          codesign --force --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$UNIVERSAL_APP"
          codesign -vvv "$UNIVERSAL_APP"

          # Verify universal binary
          echo "Verifying universal binary:"
          file "$UNIVERSAL_APP/Contents/MacOS/campp"
          lipo -info "$UNIVERSAL_APP/Contents/MacOS/campp"

      # Notarize and Create DMG for Universal
      - name: Notarize and Create DMG for Universal
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/CAMPP.app"

          # Create ZIP for notarization using ditto
          ditto -c -k --keepParent "$APP_PATH" CAMPP-universal.zip

          # Submit for notarization
          SUBMISSION_OUTPUT=$(xcrun notarytool submit CAMPP-universal.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json)

          echo "$SUBMISSION_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | python3 -c 'import sys, json; print(json.load(sys.stdin)["id"])')
          echo "Submission ID: $SUBMISSION_ID"

          # Poll for notarization completion
          echo "Waiting for notarization to complete..."
          MAX_WAIT=1800
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1)

            STATUS=$(echo "$STATUS_OUTPUT" | python3 -c 'import sys, json; print(json.load(sys.stdin)["status"])')
            echo "Current status: $STATUS (elapsed: ${ELAPSED}s)"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization successful!"
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "Notarization failed!"
              echo "$STATUS_OUTPUT"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Notarization timed out after ${MAX_WAIT}s"
            exit 1
          fi

          # Staple the ticket
          xcrun stapler staple "$APP_PATH"

          # Create DMG
          DMG_PATH="src-tauri/target/universal-apple-darwin/release/bundle/dmg/CAMPP-universal.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          hdiutil create -volname "CAMPP" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      # Upload artifacts - upload all DMG files found
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-macOS
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # List uploaded artifacts for debugging
      - name: List macOS Artifacts
        run: |
          echo "=== macOS DMG files ==="
          find src-tauri/target -name "*.dmg" -type f || echo "No DMG files found"
          ls -lah src-tauri/target/*/release/bundle/dmg/ || true

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      # Upload all Windows bundle formats
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # List uploaded artifacts for debugging
      - name: List Windows Artifacts
        shell: pwsh
        run: |
          Write-Host "=== Windows bundle files ==="
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | ForEach-Object { Write-Host $_.FullName }
          Write-Host ""
          Write-Host "=== Bundle directory listing ==="
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse | Format-Table -AutoSize

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      # Upload all Linux bundle formats
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-Linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      # List uploaded artifacts for debugging
      - name: List Linux Artifacts
        run: |
          echo "=== Linux bundle files ==="
          find src-tauri/target/release/bundle -type f || echo "No bundle files found"
          ls -R src-tauri/target/release/bundle/ || true

  # Create release with all artifacts
  create-release:
    needs: [build-macos, build-windows, build-linux]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: CAMPP-*
          merge-multiple: false

      - name: Show downloaded files
        run: |
          echo "=== Downloaded artifact structure ==="
          find artifacts -type f | sort
          echo ""
          echo "=== Artifact directory listing ==="
          ls -laR artifacts/

      - name: Prepare release assets
        run: |
          echo "=== Preparing release assets ==="
          # Create a flat directory structure for release assets
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          echo "=== Release assets to upload ==="
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CAMPP ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: false
