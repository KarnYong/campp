name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      # Import Code Signing Certificate
      - name: Import Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          # Set keychain settings to prevent UI prompts
          security set-keychain-settings -lut 21600 build.keychain
          # Add codesign to ACL with all necessary flags
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          security list-keychains -s build.keychain
          security find-identity -v build.keychain

      # Get signing identity from certificate
      - name: Get Signing Identity
        id: signing_identity
        run: |
          # List all identities and find Developer ID Application
          security find-identity -v build.keychain
          IDENTITY=$(security find-identity -v build.keychain | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application certificate found!"
            exit 1
          fi
          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "Found identity: $IDENTITY"

      # Update tauri.conf.json with the signing identity
      - name: Update Signing Identity in Config
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          import json, os
          with open('src-tauri/tauri.conf.json', 'r') as f:
              config = json.load(f)
          config['bundle']['macOS']['signingIdentity'] = os.environ['IDENTITY']
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(config, f, indent='  ')
        shell: python3 {0}

      # Build for ARM64
      - name: Build ARM64
        run: npm run tauri build -- --target aarch64-apple-darwin

      # Build for x64
      - name: Build x64
        run: npm run tauri build -- --target x86_64-apple-darwin

      # Verify and re-sign ARM64 app
      - name: Verify and Re-sign ARM64
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/CAMPP.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"
          # Unlock keychain before signing
          security unlock-keychain -p actions build.keychain
          # Verify current signature
          codesign -dv "$APP_PATH" 2>&1 || true
          # Re-sign with hardened runtime (removed deprecated --deep flag)
          codesign --force --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"
          # Verify signature again
          codesign -vvv "$APP_PATH"

      # Notarize and create DMG for ARM64
      - name: Notarize and Create DMG for ARM64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/CAMPP.app"

          # Create ZIP for notarization
          zip -r CAMPP-arm64.zip "$APP_PATH"

          # Submit for notarization
          xcrun notarytool submit CAMPP-arm64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json

          # Staple the ticket
          xcrun stapler staple "$APP_PATH"

          # Create DMG
          DMG_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/CAMPP-arm64.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          hdiutil create -volname "CAMPP" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      # Verify and re-sign x64 app
      - name: Verify and Re-sign x64
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/CAMPP.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"
          # Unlock keychain before signing
          security unlock-keychain -p actions build.keychain
          # Verify current signature
          codesign -dv "$APP_PATH" 2>&1 || true
          # Re-sign with hardened runtime (removed deprecated --deep flag)
          codesign --force --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"
          # Verify signature again
          codesign -vvv "$APP_PATH"

      # Notarize and create DMG for x64
      - name: Notarize and Create DMG for x64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/CAMPP.app"

          # Create ZIP for notarization
          zip -r CAMPP-x64.zip "$APP_PATH"

          # Submit for notarization
          xcrun notarytool submit CAMPP-x64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json

          # Staple the ticket
          xcrun stapler staple "$APP_PATH"

          # Create DMG
          DMG_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/CAMPP-x64.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          hdiutil create -volname "CAMPP" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      # Upload artifacts
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-macOS
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/CAMPP-arm64.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/CAMPP-x64.dmg

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CAMPP ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-Windows
          path: src-tauri/target/*/release/bundle/msi/*.msi

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CAMPP ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-Linux
          path: src-tauri/target/*/release/bundle/deb/*.deb

  # Create release with all artifacts
  create-release:
    needs: [build-macos, build-windows, build-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || inputs.create_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/CAMPP-macOS/CAMPP-arm64.dmg
            artifacts/CAMPP-macOS/CAMPP-x64.dmg
            artifacts/CAMPP-Windows/*.msi
            artifacts/CAMPP-Linux/*.deb
          draft: true
          prerelease: false
          generate_release_notes: true
